spring.application.name=telemedicine
server.port=8085

spring.datasource.url=jdbc:postgresql://ep-young-lab-an66dqh3-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
