spring.application.name=auth-service
server.port=8081

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=MAP_SECRET_KEY_MAP_SECRET_KEY_MAP_SECRET_KEY_MAP_SECRET_KEY_MAP_SECRET_KEY_MAP_SECRET_KEY
jwt.expiration=1800000

service.doctor.url=http://doctor-service/api/doctors
service.patient.url=http://patient-service/api/patients

logging.level.org.springframework.security=DEBUG
logging.level.com.shc.auth=DEBUG

spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

spring.jackson.time-zone=Asia/Colombo

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized